services:
  waf:
    image: owasp/modsecurity-crs:nginx-alpine
    restart: unless-stopped
    depends_on:
      - nginx
    environment:
      BACKEND: "https://nginx:443"
      PROXY_SSL: "on"
      PROXY_SSL_VERIFY: "off"
      PROXY_SSL_CERT: /etc/nginx/conf/localhost.crt
      PROXY_SSL_CERT_KEY: /etc/nginx/conf/localhost.key
      PORT: "8080"
      SSL_PORT: "8443"
      SSL_CERT_FILE: /etc/nginx/conf/localhost.crt
      SSL_CERT_KEY_FILE: /etc/nginx/conf/localhost.key
      BLOCKING_PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      MODSEC_RULE_ENGINE: "on"
      MODSEC_AUDIT_LOG: /dev/stdout
      MODSEC_AUDIT_LOG_FORMAT: JSON
      MODSEC_AUDIT_ENGINE: RelevantOnly
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./reverse-proxy/certs:/etc/nginx/conf:ro
